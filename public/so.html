<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sổ kết quả xổ số</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #222; font-size: 14px; }

    /* ── Header ───────────────────────────────────── */
    header {
      background: #1a6b3c; color: #fff;
      padding: 12px 20px; display: flex; align-items: center; gap: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,.25); position: sticky; top: 0; z-index: 100;
    }
    header h1 { font-size: 1.1rem; }
    .header-links { margin-left: auto; display: flex; gap: 14px; }
    .header-links a { color: #adf5c3; text-decoration: none; font-size: .82rem; }
    .header-links a:hover { color: #fff; }

    /* ── Filter bar ───────────────────────────────── */
    .filter-bar {
      background: #fff; border-bottom: 1px solid #ddd;
      padding: 0 20px; display: flex; flex-wrap: wrap; align-items: stretch; gap: 0;
      position: sticky; top: 49px; z-index: 90;
    }

    /* Region tabs */
    .region-tabs { display: flex; border-right: 1px solid #eee; }
    .region-tab {
      padding: 12px 22px; font-weight: 700; font-size: .9rem;
      cursor: pointer; color: #555; border-bottom: 3px solid transparent;
      transition: all .15s; white-space: nowrap; user-select: none;
    }
    .region-tab:hover { color: #1a6b3c; }
    .region-tab.active { color: #1a6b3c; border-bottom-color: #1a6b3c; }

    /* Days tabs */
    .days-tabs { display: flex; gap: 0; padding: 0 8px; align-items: center; flex-wrap: wrap; }
    .days-tab {
      padding: 6px 14px; border-radius: 20px; margin: 4px;
      font-size: .82rem; font-weight: 600; cursor: pointer;
      color: #555; background: #f5f5f5; border: 1px solid #e0e0e0;
      transition: all .15s; white-space: nowrap; user-select: none;
    }
    .days-tab:hover { background: #e8f5e9; color: #1a6b3c; border-color: #a5d6a7; }
    .days-tab.active { background: #1a6b3c; color: #fff; border-color: #1a6b3c; }

    /* ── Main ─────────────────────────────────────── */
    main { padding: 16px 20px; max-width: 1200px; margin: 0 auto; }

    .state-msg { text-align: center; padding: 60px 20px; color: #999; font-size: 1rem; }
    .state-msg.err { color: #e74c3c; }

    /* ── Period header ────────────────────────────── */
    .period-info {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; color: #555; font-size: .85rem;
    }
    .period-info strong { color: #1a6b3c; font-size: .95rem; }
    .ky-badge {
      background: #1a6b3c; color: #fff;
      border-radius: 12px; padding: 2px 10px; font-size: .78rem; font-weight: 700;
    }

    /* ── Date card ────────────────────────────────── */
    .date-card {
      background: #fff; border-radius: 8px; overflow: hidden;
      box-shadow: 0 1px 5px rgba(0,0,0,.08); margin-bottom: 16px;
    }
    .date-card-head {
      background: #1a6b3c; color: #fff;
      padding: 8px 16px; display: flex; align-items: center; gap: 10px;
    }
    .date-card-head .day-label {
      background: rgba(255,255,255,.2); border-radius: 4px;
      padding: 2px 8px; font-size: .78rem; font-weight: 600;
    }
    .date-card-head .date-str { font-weight: 700; font-size: .95rem; }
    .date-card-head .ky-num { margin-left: auto; font-size: .78rem; opacity: .75; }

    /* ── Prize table (common) ─────────────────────── */
    .prize-wrap { overflow-x: auto; }
    .prize-tbl {
      width: 100%; border-collapse: collapse; min-width: 280px;
    }
    .prize-tbl th {
      background: #f0faf4; padding: 7px 10px;
      font-size: .8rem; color: #1a6b3c; font-weight: 700;
      text-align: center; border-bottom: 2px solid #c8e6c9;
      white-space: nowrap;
    }
    .prize-tbl td {
      padding: 5px 8px; border-bottom: 1px solid #f0f0f0;
      vertical-align: middle;
    }
    .prize-tbl tr:last-child td { border-bottom: none; }
    .prize-tbl tr:hover td { background: #f9fef9; }

    /* Prize label column */
    .td-label {
      font-size: .78rem; font-weight: 700; color: #888;
      text-align: center; white-space: nowrap;
      width: 46px; background: #fafafa; border-right: 1px solid #f0f0f0;
    }

    /* Province header cell */
    .th-province { font-size: .82rem; color: #1a6b3c; font-weight: 700; }

    /* Numbers in prize cells */
    .nums-cell { text-align: center; }
    .num {
      display: inline-block; margin: 2px;
      font-weight: 700; letter-spacing: .5px;
    }

    /* Special prize */
    .row-special .num {
      font-size: 1.3rem; color: #c0392b;
    }
    /* G.1 */
    .row-first .num { font-size: 1.05rem; color: #e67e22; }
    /* G.2 */
    .row-second .num { font-size: .95rem; color: #2980b9; }
    /* G.3 */
    .row-third .num { font-size: .88rem; }
    /* G.4 */
    .row-fourth .num { font-size: .85rem; }
    /* G.5 – G.8 */
    .row-fifth .num,
    .row-sixth .num,
    .row-seventh .num,
    .row-eighth .num { font-size: .82rem; color: #555; }

    /* Pending cell */
    .num-pending { color: #ccc; font-weight: 400; font-size: .82rem; }

    /* MB layout: single wide column */
    .prize-tbl.mb .td-label { width: 54px; }
    .prize-tbl.mb .nums-cell { text-align: left; padding-left: 14px; }
    .prize-tbl.mb .row-special .nums-cell { text-align: center; }

    /* No-data */
    .no-data { text-align: center; color: #bbb; padding: 16px; font-size: .85rem; }

    /* ── Skeleton loader ──────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }
    .skel {
      height: 110px; border-radius: 8px; margin-bottom: 16px;
      background: linear-gradient(90deg,#ececec 25%,#f8f8f8 50%,#ececec 75%);
      background-size: 1200px 100%;
      animation: shimmer 1.4s infinite linear;
    }

    /* ── Load more ────────────────────────────────── */
    .btn-loadmore {
      display: block; width: 100%; padding: 12px;
      background: #fff; border: 2px dashed #c8e6c9;
      color: #1a6b3c; font-weight: 700; font-size: .9rem;
      border-radius: 8px; cursor: pointer; text-align: center;
      margin-top: 4px; transition: all .15s;
    }
    .btn-loadmore:hover { background: #f0faf4; border-color: #1a6b3c; }

    @media (max-width: 600px) {
      main { padding: 10px; }
      .region-tab { padding: 10px 14px; font-size: .85rem; }
    }
  </style>
</head>
<body>

<header>
  <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
    <line x1="9" y1="21" x2="9" y2="9"/>
  </svg>
  <h1>Sổ kết quả xổ số</h1>
  <div class="header-links">
    <a href="/stats.html">Thống kê</a>
    <a href="/live.html">Trực tiếp</a>
    <a href="/">Trang chủ</a>
  </div>
</header>

<!-- Filter bar -->
<div class="filter-bar">
  <div class="region-tabs">
    <div class="region-tab active" data-region="mn">Miền Nam</div>
    <div class="region-tab" data-region="mt">Miền Trung</div>
    <div class="region-tab" data-region="mb">Miền Bắc</div>
  </div>
  <div class="days-tabs">
    <div class="days-tab" data-days="10">10 ngày</div>
    <div class="days-tab active" data-days="30">30 ngày</div>
    <div class="days-tab" data-days="60">60 ngày</div>
    <div class="days-tab" data-days="90">90 ngày</div>
    <div class="days-tab" data-days="200">200 ngày</div>
    <div class="days-tab" data-days="300">300 ngày</div>
  </div>
</div>

<main id="main">
  <div class="state-msg">Đang tải dữ liệu...</div>
</main>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const PRIZE_ORDER_MN = ['eighth','seventh','sixth','fifth','fourth','third','second','first','special']
const PRIZE_ORDER_MB = ['special','first','second','third','fourth','fifth','sixth','seventh']
const PRIZE_LABEL = {
  special:'G.ĐB', first:'G.1', second:'G.2', third:'G.3',
  fourth:'G.4', fifth:'G.5', sixth:'G.6', seventh:'G.7', eighth:'G.8',
}

let currentRegion = 'mn'
let currentDays   = 30
let allData       = []    // cache toàn bộ dữ liệu đã fetch
let displayCount  = 0     // số ngày đang hiển thị
const PAGE_SIZE   = 20    // load thêm mỗi lần bấm

// ── Tab events ─────────────────────────────────────────────────────────────
document.querySelectorAll('.region-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.region-tab').forEach(t => t.classList.remove('active'))
    tab.classList.add('active')
    currentRegion = tab.dataset.region
    load()
  })
})

document.querySelectorAll('.days-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.days-tab').forEach(t => t.classList.remove('active'))
    tab.classList.add('active')
    currentDays = Number(tab.dataset.days)
    load()
  })
})

// ── Fetch ───────────────────────────────────────────────────────────────────
async function load() {
  const main = document.getElementById('main')
  main.innerHTML = skeletons(6)
  allData      = []
  displayCount = 0

  try {
    const res  = await fetch(`/api/results/so?region=${currentRegion}&days=${currentDays}`)
    const json = await res.json()
    if (!json.success) throw new Error(json.message || 'Lỗi API')
    allData = json.data || []
    renderPage(json)
  } catch (e) {
    main.innerHTML = `<div class="state-msg err">Lỗi: ${e.message}</div>`
  }
}

// ── Render ──────────────────────────────────────────────────────────────────
function renderPage(json) {
  const main     = document.getElementById('main')
  const isMB     = currentRegion === 'mb'
  const total    = allData.length
  displayCount   = Math.min(PAGE_SIZE, total)

  if (!total) {
    main.innerHTML = `<div class="state-msg">Không có dữ liệu trong khoảng thời gian này.</div>`
    return
  }

  const from = json.period?.from || ''
  const to   = json.period?.to   || ''

  let html = `<div class="period-info">
    <strong>${regionName(currentRegion)} — ${currentDays} ngày gần nhất</strong>
    <span>${from} → ${to}</span>
    <span class="ky-badge">${json.totalKy} kỳ</span>
  </div>`

  html += renderCards(allData.slice(0, displayCount), isMB)

  if (total > displayCount) {
    html += `<button class="btn-loadmore" id="btn-more">
      Xem thêm ${Math.min(PAGE_SIZE, total - displayCount)} ngày (còn ${total - displayCount} ngày) ▼
    </button>`
  }

  main.innerHTML = html
  document.getElementById('btn-more')?.addEventListener('click', loadMore)
}

function loadMore() {
  const isMB  = currentRegion === 'mb'
  const total = allData.length
  const next  = Math.min(displayCount + PAGE_SIZE, total)
  const moreCards = renderCards(allData.slice(displayCount, next), isMB)
  displayCount = next

  const btn = document.getElementById('btn-more')
  btn.insertAdjacentHTML('beforebegin', moreCards)

  if (displayCount >= total) {
    btn.remove()
  } else {
    btn.textContent = `Xem thêm ${Math.min(PAGE_SIZE, total - displayCount)} ngày (còn ${total - displayCount} ngày) ▼`
  }
}

// ── Card builder ────────────────────────────────────────────────────────────
function renderCards(items, isMB) {
  return items.map((item, idx) => {
    const globalIdx = allData.indexOf(item)
    return renderCard(item, isMB, allData.length - globalIdx)
  }).join('')
}

function renderCard(item, isMB, kyNum) {
  const results = item.results || []
  const tableHtml = isMB
    ? renderMB(results[0])
    : renderMNMT(results)

  return `
  <div class="date-card">
    <div class="date-card-head">
      <span class="day-label">${item.dayLabel || ''}</span>
      <span class="date-str">${formatDate(item.date)}</span>
      <span class="ky-num">Kỳ ${kyNum}</span>
    </div>
    <div class="prize-wrap">${tableHtml}</div>
  </div>`
}

// ── MB: 1 tỉnh, dạng list dọc ───────────────────────────────────────────────
function renderMB(result) {
  if (!result) return `<div class="no-data">Chưa có kết quả</div>`

  const p = result.prizes || {}

  const rows = PRIZE_ORDER_MB.map(key => {
    const nums = p[key]
    const numsHtml = nums && nums.length
      ? nums.map(n => `<span class="num">${n}</span>`).join('')
      : `<span class="num-pending">—</span>`
    return `<tr class="row-${key}">
      <td class="td-label">${PRIZE_LABEL[key]}</td>
      <td class="nums-cell">${numsHtml}</td>
    </tr>`
  }).join('')

  const province = result.province?.name || 'Miền Bắc'
  return `<table class="prize-tbl mb">
    <thead><tr><th style="width:54px"></th><th class="th-province">${province}</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`
}

// ── MN/MT: nhiều tỉnh, tỉnh = cột ───────────────────────────────────────────
function renderMNMT(results) {
  if (!results.length) return `<div class="no-data">Chưa có kết quả</div>`

  // Header: tên tỉnh
  const headCols = results.map(r =>
    `<th class="th-province">${r.province?.name || '—'}</th>`
  ).join('')

  const rows = PRIZE_ORDER_MN.map(key => {
    const cols = results.map(r => {
      const nums = r.prizes?.[key]
      const numsHtml = nums && nums.length
        ? nums.map(n => `<span class="num">${n}</span>`).join('')
        : `<span class="num-pending">—</span>`
      return `<td class="nums-cell">${numsHtml}</td>`
    }).join('')
    return `<tr class="row-${key}">
      <td class="td-label">${PRIZE_LABEL[key]}</td>
      ${cols}
    </tr>`
  }).join('')

  return `<table class="prize-tbl mnmt">
    <thead><tr><th style="width:46px"></th>${headCols}</tr></thead>
    <tbody>${rows}</tbody>
  </table>`
}

// ── Helpers ─────────────────────────────────────────────────────────────────
function regionName(r) {
  return { mn: 'Miền Nam', mt: 'Miền Trung', mb: 'Miền Bắc' }[r] || r
}

function formatDate(d) {
  if (!d) return ''
  const [y, m, day] = d.split('-')
  return `${day}/${m}/${y}`
}

function skeletons(n) {
  return Array(n).fill('<div class="skel"></div>').join('')
}

// ── Boot ────────────────────────────────────────────────────────────────────
load()
</script>

</body>
</html>
